interface:
  display_name: "拼贴 B-roll"
  short_description: "隐喻确认→彩色静帧确认→Vertex Omni Flash 拼贴动画"
  default_prompt: "Use $gbro-collage-broll to 把这段约 5 秒文稿做成高级 halftone paper-collage B-roll。严格执行三阶段审批：先只给视觉隐喻并等待确认；确认后只生成彩色拼贴静帧并再次等待确认；静帧确认后默认通过 Vertex Agent Platform 调用 Gemini Omni Flash，生成 5 秒 9:16 无声组装动画和 contact sheet，不再询问模型，也不要默认调用 Veo。"
policy:
  allow_implicit_invocation: true
